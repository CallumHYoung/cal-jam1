<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cal-Jam Fencing Duel</title>
<link rel="stylesheet" href="style.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0"
  }
}
</script>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div id="username">loading…</div>
  <div id="peers">connecting…</div>
  <div id="hint">WASD to move • F to challenge nearby opponent</div>
</div>
<div id="overlay">
  <div id="scorePanel" class="hidden">
    <div id="scoreMe">0</div>
    <div id="scoreSep">—</div>
    <div id="scoreOpp">0</div>
  </div>
  <div id="centerMsg" class="hidden"></div>
  <div id="timer" class="hidden">4</div>
  <div id="moveHints" class="hidden">
    <div class="moveKey" data-move="1">
      <div class="top"><span class="k">1</span> Thrust</div>
      <div class="sub"><span class="beats">beats Feint</span> · <span class="loses">loses to Parry</span></div>
    </div>
    <div class="moveKey" data-move="2">
      <div class="top"><span class="k">2</span> Parry</div>
      <div class="sub"><span class="beats">beats Thrust</span> · <span class="loses">loses to Feint</span></div>
    </div>
    <div class="moveKey" data-move="3">
      <div class="top"><span class="k">3</span> Feint</div>
      <div class="sub"><span class="beats">beats Parry</span> · <span class="loses">loses to Thrust</span></div>
    </div>
  </div>
</div>
<button id="portalBtn">no portal</button>
<script src="portal.js"></script>
<script type="module" src="game.js"></script>
</body>
</html>
